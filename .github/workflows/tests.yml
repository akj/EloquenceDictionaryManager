name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Run tests
        run: pytest tests/ -q
      - name: Verify vendored dictionary content against the lock
        run: python tools/vendored_sets.py verify
      - name: Verify historical-union artifacts against the lock
        run: python tools/historical_union.py verify
